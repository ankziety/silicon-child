services:
  ai-infant:
    build: .
    container_name: ai-infant-research
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./.env:/app/.env
    environment:
      - PYTHONPATH=/app
      - DISPLAY=:99
    env_file:
      - .env
    command: python -m ai_infant --duration 15
    restart: unless-stopped
